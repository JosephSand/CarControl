            synthwave: { name: 'Synthwave', vars: { '--bg-app': '#1c1938', '--bg-panel': 'rgba(45, 41, 77, 0.8)', '--bg-card': 'rgba(28, 25, 56, 0.6)', '--bg-input': '#131127', '--bg-subcard': 'rgba(45, 41, 77, 0.4)', '--border-color': '#3f396b', '--text-main': '#fbcfe8', '--text-title': '#ffffff', '--text-muted': '#f472b6', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(244, 114, 182, 0.05) 2px, rgba(244, 114, 182, 0.05) 4px)' }},

            forest: { name: 'Dark Forest', vars: { '--bg-app': '#0f1f14', '--bg-panel': 'rgba(20, 41, 26, 0.8)', '--bg-card': 'rgba(15, 31, 20, 0.6)', '--bg-input': '#08120b', '--bg-subcard': 'rgba(20, 41, 26, 0.5)', '--border-color': '#166534', '--text-main': '#bbf7d0', '--text-title': '#f0fdf4', '--text-muted': '#4ade80', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'none' }},
            midnight: { name: 'Midnight Slate', vars: { '--bg-app': '#0f172a', '--bg-panel': 'rgba(30, 41, 59, 0.85)', '--bg-card': 'rgba(15, 23, 42, 0.6)', '--bg-input': '#020617', '--bg-subcard': 'rgba(30, 41, 59, 0.5)', '--border-color': '#334155', '--text-main': '#cbd5e1', '--text-title': '#f8fafc', '--text-muted': '#94a3b8', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'none' }},
            industrial: { name: 'Industrial Zinc', vars: { '--bg-app': '#18181b', '--bg-panel': 'rgba(39, 39, 42, 0.9)', '--bg-card': 'rgba(24, 24, 27, 0.8)', '--bg-input': '#09090b', '--bg-subcard': 'rgba(39, 39, 42, 0.5)', '--border-color': '#3f3f46', '--text-main': '#d4d4d8', '--text-title': '#fafafa', '--text-muted': '#a1a1aa', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'none' }},
            minimal: { name: 'Minimal Light', vars: { '--bg-app': '#f8fafc', '--bg-panel': 'rgba(255, 255, 255, 0.8)', '--bg-card': 'rgba(255, 255, 255, 0.9)', '--bg-input': '#f1f5f9', '--bg-subcard': 'rgba(241, 245, 249, 0.6)', '--border-color': '#e2e8f0', '--text-main': '#475569', '--text-title': '#0f172a', '--text-muted': '#64748b', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'none' }},
            organic: { name: 'Organic Sand', vars: { '--bg-app': '#fafaf9', '--bg-panel': 'rgba(245, 245, 244, 0.85)', '--bg-card': 'rgba(255, 255, 255, 1)', '--bg-input': '#f5f5f4', '--bg-subcard': 'rgba(231, 229, 228, 0.4)', '--border-color': '#d6d3d1', '--text-main': '#57534e', '--text-title': '#1c1917', '--text-muted': '#78716c', '--font-mono': '"Space Mono", monospace', '--app-bg-image': 'none' }}
        };

        // 10 COLORS
        const COLORS = {
            cyan: { name: 'Cyan', rgb: '14 165 233', hex: '#0ea5e9' },
            rose: { name: 'Rose', rgb: '244 63 94', hex: '#f43f5e' },
            amber: { name: 'Amber', rgb: '245 158 11', hex: '#f59e0b' },
            emerald: { name: 'Emerald', rgb: '16 185 129', hex: '#10b981' },
            purple: { name: 'Purple', rgb: '168 85 247', hex: '#a855f7' },
            blue: { name: 'Blue', rgb: '59 130 246', hex: '#3b82f6' },
            orange: { name: 'Orange', rgb: '249 115 22', hex: '#f97316' },
            pink: { name: 'Pink', rgb: '236 72 153', hex: '#ec4899' },
            lime: { name: 'Lime', rgb: '132 204 22', hex: '#84cc16' },
            indigo: { name: 'Indigo', rgb: '99 102 241', hex: '#6366f1' }
        };

        const CAR_DATABASE = {
            'Kia': ['Soul', 'Forte', 'Rio', 'Sorento', 'Sportage', 'Niro'],
            'Toyota': ['Corolla', 'Hilux', 'RAV4', 'Yaris'],
            'Honda': ['Civic', 'CR-V', 'Fit', 'HR-V'],
            'Nissan': ['March', 'Sentra', 'Versa', 'Kicks']
        };
        const YEARS = Array.from({ length: 30 }, (_, i) => new Date().getFullYear() + 1 - i);

        const MAINTENANCE_TASKS = [
            { id: 'oil', name: 'Cambio de Aceite y Filtro', intervalKm: 10000, icon: 'ph-drop', color: { hex: '#f59e0b', rgb: '245 158 11' } }, 
            { id: 'tires', name: 'Rotación/Cambio Llantas', intervalKm: 10000, icon: 'ph-lifebuoy', color: { hex: '#10b981', rgb: '16 185 129' } }, 
            { id: 'cabin_filter', name: 'Filtro de Cabina', intervalKm: 20000, icon: 'ph-wind', color: { hex: '#0ea5e9', rgb: '14 165 233' } }, 
            { id: 'engine_filter', name: 'Filtro de Motor', intervalKm: 40000, icon: 'ph-engine', color: { hex: '#3b82f6', rgb: '59 130 246' } }, 
            { id: 'brake_fluid', name: 'Líquido de Frenos', intervalKm: 40000, icon: 'ph-warning-drop', color: { hex: '#8b5cf6', rgb: '139 92 246' } }, 
            { id: 'brakes', name: 'Balatas / Frenos', intervalKm: 30000, icon: 'ph-shield-warning', color: { hex: '#f43f5e', rgb: '244 63 94' } }, 
            { id: 'spark_plugs', name: 'Bujías', intervalKm: 100000, icon: 'ph-lightning', color: { hex: '#d946ef', rgb: '217 70 239' } }, 
            { id: 'battery', name: 'Batería', intervalKm: 20000, icon: 'ph-battery-charging', color: { hex: '#eab308', rgb: '234 179 8' } } 
        ];

        let state = {
            userId: null,
            preferences: { theme: 'futuristic', color: 'cyan' },
            profile: {
                vehicle: { make: 'Kia', model: 'Soul', year: '2018' },
                currentMileage: 0,
                lastMileageUpdate: null,
                contact: { wantsAlerts: false, name: '', email: '', phone: '' },
                services: {},
                nextDates: {} // Vital para Github Actions
            },
            history: [],
            expandedLogId: null
        };

        let dbRef = null;

        try {
            const fbApp = initializeApp(firebaseConfig);
            const fbAuth = getAuth(fbApp);
            dbRef = getFirestore(fbApp);

            signInAnonymously(fbAuth);
            onAuthStateChanged(fbAuth, (user) => {
                if (user) {
                    state.userId = user.uid;
                    listenToCloudData(user.uid);
                }
            });
        } catch (error) {
             console.error("Firebase Error:", error);
        }

        function listenToCloudData(uid) {
            const docRef = doc(dbRef, 'users', uid, 'profile', 'data');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.profile = { 
                        ...state.profile, ...data,
                        vehicle: { ...state.profile.vehicle, ...(data.vehicle || {}) },
                        contact: { ...state.profile.contact, ...(data.contact || {}) },
                        services: { ...state.profile.services, ...(data.services || {}) },
                        nextDates: { ...state.profile.nextDates, ...(data.nextDates || {}) }
                    };
                    if (data.preferences) {
                        state.preferences = data.preferences;
                    }
                    applyPreferences();
                    renderHeader();
                    renderDashboard();
                } else {
                    setDoc(docRef, state.profile);
                }
            });

            const historyColRef = collection(dbRef, 'users', uid, 'history');
            onSnapshot(historyColRef, (snapshot) => {
                const logs = [];
                snapshot.forEach((docSnap) => logs.push({ id: docSnap.id, ...docSnap.data() }));
                logs.sort((a, b) => new Date(b.date) - new Date(a.date));
                state.history = logs;
                renderHistory();
            });
        }

        async function saveProfileToCloud(partialData) {
            if (!state.userId) return;
            const docRef = doc(dbRef, 'users', state.userId, 'profile', 'data');
            await setDoc(docRef, partialData, { merge: true });
        }

        function applyPreferences() {
            const theme = THEMES[state.preferences.theme] || THEMES.futuristic;
            const color = COLORS[state.preferences.color] || COLORS.cyan;
            const root = document.documentElement;
            
            // Aplicar variables del Tema
            for (const [key, value] of Object.entries(theme.vars)) {
                root.style.setProperty(key, value);
            }
            
            // Aplicar variable de Color
            root.style.setProperty('--color-accent', color.rgb);

            renderSettingsModal(); 
        }

        function renderHeader() {
            document.getElementById('display-make').textContent = state.profile.vehicle.make;
            document.getElementById('display-model').textContent = state.profile.vehicle.model;
            document.getElementById('display-year').textContent = state.profile.vehicle.year;
            document.getElementById('input-global-km').value = state.profile.currentMileage || '';
            
            const alertInd = document.getElementById('alert-indicator');
            if(state.profile.contact && state.profile.contact.wantsAlerts) alertInd.classList.remove('hidden');
            else alertInd.classList.add('hidden');
        }

        function renderDashboard() {
            const container = document.getElementById('view-dashboard');
            
            const tasksInfo = MAINTENANCE_TASKS.map(task => {
                const lastKm = state.profile.services[task.id] || 0;
                const nextKm = lastKm + task.intervalKm;
                const remainingKm = nextKm - state.profile.currentMileage;
                const progressPercent = Math.min(100, Math.max(0, ((state.profile.currentMileage - lastKm) / task.intervalKm) * 100));

                let dateInfo = 'No agendado';
                let status = 'good'; // good, soon, overdue

                if (remainingKm < 0) status = 'overdue';
                else if (remainingKm <= 1500) status = 'soon';

                // Usando las Fechas (NextDates) guardadas para GitHub Actions
                if (state.profile.nextDates && state.profile.nextDates[task.id]) {
                    const scheduledDate = new Date(state.profile.nextDates[task.id]);
                    const today = new Date();
                    scheduledDate.setHours(0,0,0,0); today.setHours(0,0,0,0);
                    
                    const daysDiff = Math.ceil((scheduledDate.getTime() - today.getTime()) / (1000 * 3600 * 24));
                    if (daysDiff < 0) {
                        dateInfo = `Vencido (${Math.abs(daysDiff)} días)`;
                        status = 'overdue'; 
                    } else if (daysDiff <= 15) {
                        dateInfo = `En ${daysDiff} días`;
                        if(status !== 'overdue') status = 'soon';
                    } else {
                        dateInfo = scheduledDate.toLocaleDateString();
                    }
                }

                return { ...task, lastKm, nextKm, remainingKm, progressPercent, status, dateInfo };
            }).sort((a, b) => a.remainingKm - b.remainingKm);

            container.innerHTML = tasksInfo.map(task => {
                const taskRGB = task.color.rgb;
                const taskHex = task.color.hex;
                
                let alertStyles = '';
                if(task.status === 'overdue') alertStyles = 'border-rose-500/50 shadow-[0_0_15px_rgba(244,63,94,0.2)] animate-pulse';
                else if(task.status === 'soon') alertStyles = 'border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]';

                return `
                <article class="bg-themeCard rounded-2xl border border-themeBorder overflow-hidden shadow-sm group hover:border-slate-500/50 transition-all duration-300 ${alertStyles}">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4 gap-4">
                            <div class="flex items-center gap-3">
                                <div class="p-2.5 rounded-xl border border-themeBorder bg-themeInput" style="color: ${taskHex}; border-color: rgba(${taskRGB}, 0.3); box-shadow: 0 0 10px rgba(${taskRGB}, 0.2);">
                                    <i class="ph-duotone ${task.icon} text-3xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-themeTitle text-sm leading-tight tracking-wide">${task.name}</h3>
                                    <p class="text-[10px] text-themeMuted mt-0.5 font-mono uppercase tracking-widest flex items-center gap-1">
                                        <i class="ph-duotone ph-calendar text-xs" style="color: ${taskHex}"></i> ${task.dateInfo}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="bg-themeSubCard p-4 rounded-xl border border-themeBorder">
                            <div class="flex justify-between text-sm mb-2 items-end">
                                <span class="text-themeMuted font-medium text-xs">Desgaste Odómetro:</span>
                                <span class="font-mono text-themeTitle">${task.nextKm.toLocaleString()} <span class="opacity-50 text-xs">km</span></span>
                            </div>
                            <div class="w-full bg-themeInput rounded-full h-1.5 mb-2 overflow-hidden shadow-inner">
                                <div class="h-full rounded-full transition-all duration-500 ease-out" style="width: ${task.progressPercent}%; background-color: ${taskHex}; box-shadow: 0 0 10px ${taskHex};"></div>
                            </div>
                            <div class="flex justify-between text-xs mt-3">
                                <span class="text-themeMuted font-mono bg-themePanel px-2 py-0.5 rounded border border-themeBorder">
                                    Último: ${task.lastKm === 0 ? '---' : task.lastKm.toLocaleString()}
                                </span>
                                <span class="font-mono font-bold" style="color: ${taskHex}">
                                    ${task.remainingKm < 0 ? `-${Math.abs(task.remainingKm).toLocaleString()} km` : `+${task.remainingKm.toLocaleString()} km`}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="px-5 pb-5 pt-0">
                        <button data-task-id="${task.id}" class="btn-open-log w-full py-2.5 px-4 bg-themeSubCard border border-themeBorder rounded-xl text-sm font-bold text-themeMain hover:bg-themePanel transition-all flex items-center justify-center gap-2 group-hover:shadow-glow" style="--color-accent: ${taskRGB};">
                            <i class="ph-duotone ph-plus-circle text-lg"></i> REGISTRAR SERVICIO
                        </button>
                    </div>
                </article>`;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (state.history.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center text-themeMuted">
                        <i class="ph-duotone ph-pen-nib text-4xl opacity-50 mb-3 block"></i>
                        <p class="font-mono text-sm uppercase tracking-widest">Aún no hay registros</p>
                    </div>`;
                return;
            }

            container.innerHTML = state.history.map(log => {
                const isExpanded = state.expandedLogId === log.id;
                const taskDef = MAINTENANCE_TASKS.find(t => t.id === log.taskId);
                const taskHex = taskDef ? taskDef.color.hex : '#cbd5e1';
                const taskRGB = taskDef ? taskDef.color.rgb : '203 213 225';

                return `
                <div class="hover:bg-themeSubCard transition-colors">
                    <div class="btn-toggle-log p-4 sm:p-5 flex items-center justify-between cursor-pointer group" data-log-id="${log.id}">
                        <div class="flex items-center gap-4">
                            <div class="hidden sm:flex bg-themeInput p-2.5 rounded-xl border border-themeBorder transition-all" style="color: ${taskHex}; border-color: rgba(${taskRGB}, 0.3);">
                                <i class="ph-duotone ${taskDef ? taskDef.icon : 'ph-wrench'} text-2xl"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-themeTitle text-sm sm:text-base tracking-wide">${log.taskName}</h4>
                                <div class="flex items-center gap-2 mt-1 font-mono">
                                    <span class="text-xs px-2 py-0.5 rounded border" style="color: ${taskHex}; background-color: rgba(${taskRGB}, 0.1); border-color: rgba(${taskRGB}, 0.2);">${log.km.toLocaleString()} km</span>
                                    <span class="text-xs text-themeMuted flex items-center gap-1"><i class="ph-duotone ph-calendar text-sm"></i>${new Date(log.date).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            ${log.cost ? `<span class="font-mono font-bold text-emerald-500 text-sm hidden sm:block">$${parseFloat(log.cost).toLocaleString()}</span>` : ''}
                            <i class="ph-duotone ph-caret-down text-xl text-themeMuted transition-transform ${isExpanded ? 'rotate-180' : ''}" style="${isExpanded ? `color: ${taskHex}` : ''}"></i>
                        </div>
                    </div>
                    ${isExpanded ? `
                    <div class="px-4 sm:px-5 pb-5 pt-0 pl-4 sm:pl-[84px] animate-in slide-in-from-top-2 duration-200">
                        <div class="bg-black/20 border border-themeBorder rounded-xl p-4 text-sm shadow-inner relative">
                            ${log.notes ? `
                            <div>
                                <span class="text-themeMuted text-[10px] uppercase tracking-widest block mb-1 font-mono">Notas:</span>
                                <p class="text-themeMain italic text-xs leading-relaxed border-l-2 pl-2" style="border-color: ${taskHex}">${log.notes}</p>
                            </div>` : '<span class="text-themeMuted text-xs italic font-mono">Sin notas.</span>'}
                            
                            <!-- BOTÓN DE ELIMINAR / BASURERO -->
                            <button data-delete-id="${log.id}" class="btn-delete-log absolute top-4 right-4 p-2 bg-rose-500/10 text-rose-500 rounded-lg border border-rose-500/30 hover:bg-rose-500 hover:text-white transition-colors" title="Eliminar Registro">
                                <i class="ph-duotone ph-trash text-xl"></i>
                            </button>
                        </div>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function renderSettingsModal() {
            const themeContainer = document.getElementById('theme-selector');
            themeContainer.innerHTML = Object.entries(THEMES).map(([key, theme]) => `
                <button type="button" class="btn-set-theme py-2 px-3 rounded-xl text-xs font-bold border transition-all ${state.preferences.theme === key ? 'border-accent bg-accent/10 text-accent shadow-glow' : 'border-themeBorder text-themeMuted hover:text-themeTitle'}" data-theme="${key}">
                    ${theme.name}
                </button>
            `).join('');

            const colorContainer = document.getElementById('color-selector');
            colorContainer.innerHTML = Object.entries(COLORS).map(([key, color]) => `
                <button type="button" class="btn-set-color w-full aspect-square rounded-full border-2 transition-all shadow-sm ${state.preferences.color === key ? 'border-white scale-110' : 'border-transparent opacity-60 hover:opacity-100 hover:scale-105'}" data-color="${key}" style="background-color: ${color.hex};" title="${color.name}">
                </button>
            `).join('');
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.querySelector('div').classList.remove('scale-95'); }, 10);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        document.addEventListener('DOMContentLoaded', () => {

            document.getElementById('tab-btn-dashboard').addEventListener('click', () => {
                document.getElementById('view-dashboard').classList.remove('hidden'); document.getElementById('view-history').classList.add('hidden');
                document.getElementById('tab-btn-dashboard').className = "flex-1 py-2 px-4 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 bg-themePanel text-accent shadow-sm border border-themeBorder";
                document.getElementById('tab-btn-history').className = "flex-1 py-2 px-4 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 text-themeMuted hover:text-themeTitle";
            });

            document.getElementById('tab-btn-history').addEventListener('click', () => {
                document.getElementById('view-dashboard').classList.add('hidden'); document.getElementById('view-history').classList.remove('hidden');
                document.getElementById('tab-btn-history').className = "flex-1 py-2 px-4 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 bg-themePanel text-accent shadow-sm border border-themeBorder";
                document.getElementById('tab-btn-dashboard').className = "flex-1 py-2 px-4 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 text-themeMuted hover:text-themeTitle";
            });

            document.getElementById('btn-save-global-km').addEventListener('click', () => {
                const val = parseInt(document.getElementById('input-global-km').value);
                if(!isNaN(val)) {
                    saveProfileToCloud({ 
                        currentMileage: val,
                        lastMileageUpdate: new Date().toISOString() 
                    });
                    
                    // Dispara la revisión instantánea de correos en GitHub
                    triggerGitHubAction();
                    
                    const btn = document.getElementById('btn-save-global-km');
                    btn.innerHTML = '<i class="ph-duotone ph-check-circle text-xl"></i>';
                    setTimeout(() => btn.innerHTML = '<i class="ph-duotone ph-floppy-disk text-xl"></i>', 2000);
                }
            });

            document.getElementById('btn-open-settings').addEventListener('click', () => { renderSettingsModal(); openModal('modal-settings'); });
            
            document.getElementById('btn-open-alerts').addEventListener('click', () => { 
                document.getElementById('input-wants-alerts').checked = state.profile.contact?.wantsAlerts || false;
                document.getElementById('input-name').value = state.profile.contact?.name || '';
                document.getElementById('input-email').value = state.profile.contact?.email || '';
                document.getElementById('input-phone').value = state.profile.contact?.phone || '';
                document.getElementById('alerts-fields').style.display = (state.profile.contact?.wantsAlerts) ? 'block' : 'none';
                openModal('modal-alerts'); 
            });

            document.getElementById('input-wants-alerts').addEventListener('change', (e) => {
                document.getElementById('alerts-fields').style.display = e.target.checked ? 'block' : 'none';
            });

            document.getElementById('form-alerts').addEventListener('submit', (e) => {
                e.preventDefault();
                saveProfileToCloud({
                    contact: {
                        wantsAlerts: document.getElementById('input-wants-alerts').checked,
                        name: document.getElementById('input-name').value,
                        email: document.getElementById('input-email').value,
                        phone: document.getElementById('input-phone').value
                    }
                }).then(() => closeModal('modal-alerts'));
            });

            document.querySelectorAll('.btn-close-modal').forEach(btn => {
                btn.addEventListener('click', (e) => closeModal(e.target.closest('.fixed').id));
            });

            document.addEventListener('click', async (e) => {
                
                // BORRAR HISTORIAL
                const btnDelete = e.target.closest('.btn-delete-log');
                if (btnDelete) {
                    if(confirm("¿Estás seguro de eliminar este registro?")) {
                        const logId = btnDelete.dataset.deleteId;
                        await deleteDoc(doc(dbRef, 'users', state.userId, 'history', logId));
                    }
                    return;
                }

                // ABRIR REGISTRO DE TAREA Y PREPARAR COLORES
                const btnLog = e.target.closest('.btn-open-log');
                if (btnLog) {
                    const taskId = btnLog.dataset.taskId;
                    const task = MAINTENANCE_TASKS.find(t => t.id === taskId);
                    
                    document.getElementById('log-task-id').value = task.id;
                    document.getElementById('log-task-icon').className = `ph-duotone ${task.icon} text-3xl`;
                    document.getElementById('log-task-name').textContent = task.name;
                    
                    const header = document.getElementById('log-task-header');
                    header.style.color = task.color.hex;
                    header.style.backgroundColor = `rgba(${task.color.rgb}, 0.1)`;
                    header.style.borderColor = `rgba(${task.color.rgb}, 0.3)`;
                    
                    document.getElementById('log-km').value = state.profile.currentMileage > (state.profile.services[task.id] || 0) ? state.profile.currentMileage : '';
                    document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
                    document.getElementById('next-service-date').value = '';
                    
                    openModal('modal-log');
                }

                const btnToggleLog = e.target.closest('.btn-toggle-log');
                if (btnToggleLog) {
                    const id = btnToggleLog.dataset.logId;
                    state.expandedLogId = state.expandedLogId === id ? null : id;
                    renderHistory();
                }

                // CAMBIAR TEMA
                const btnTheme = e.target.closest('.btn-set-theme');
                if (btnTheme) {
                    state.preferences.theme = btnTheme.dataset.theme;
                    applyPreferences(); 
                    saveProfileToCloud({ preferences: state.preferences }); 
                }

                // CAMBIAR COLOR
                const btnColor = e.target.closest('.btn-set-color');
                if (btnColor) {
                    state.preferences.color = btnColor.dataset.color;
                    applyPreferences(); 
                    saveProfileToCloud({ preferences: state.preferences }); 
                }
            });

            // CÁLCULO DE FECHA AUTOMÁTICA (6 MESES)
            document.getElementById('autoDateBtn').addEventListener('click', () => {
                const hoy = new Date();
                hoy.setMonth(hoy.getMonth() + 6);
                document.getElementById('next-service-date').value = hoy.toISOString().split('T')[0];
            });

            // GUARDAR REGISTRO DE SERVICIO
            document.getElementById('form-log').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-save-log');
                const prevText = btn.innerHTML;
                btn.innerHTML = `<i class="ph-duotone ph-spinner-gap animate-spin text-xl"></i> GUARDANDO...`;

                const taskId = document.getElementById('log-task-id').value;
                const taskDef = MAINTENANCE_TASKS.find(t => t.id === taskId);
                const km = parseInt(document.getElementById('log-km').value);
                const nextDate = document.getElementById('next-service-date').value; // Fecha del modal
                
                if(isNaN(km) || km < 0) return;

                const historyColRef = collection(dbRef, 'users', state.userId, 'history');
                await addDoc(historyColRef, {
                    taskId: taskId, taskName: taskDef.name, km: km,
                    date: document.getElementById('log-date').value,
                    notes: document.getElementById('log-notes').value,
                    cost: document.getElementById('log-cost').value,
                    timestamp: new Date().toISOString()
                });

                const newServices = { ...state.profile.services, [taskId]: km };
                const newDates = { ...state.profile.nextDates };
                if (nextDate) newDates[taskId] = nextDate; // Solo actualiza si el usuario eligió una fecha
                
                const newMileage = km > state.profile.currentMileage ? km : state.profile.currentMileage;
                
                await saveProfileToCloud({ 
                    services: newServices, 
                    nextDates: newDates, 
                    currentMileage: newMileage,
                    lastMileageUpdate: new Date().toISOString() // Actualiza timestamp
                });

                // Dispara revisión instantánea tras guardar un evento
                triggerGitHubAction();

                closeModal('modal-log');
                btn.innerHTML = prevText;
            });
            
            document.getElementById('select-make').innerHTML = Object.keys(CAR_DATABASE).map(m => `<option>${m}</option>`).join('');
            document.getElementById('select-model').innerHTML = CAR_DATABASE['Kia'].map(m => `<option>${m}</option>`).join('');
            document.getElementById('select-year').innerHTML = YEARS.map(y => `<option>${y}</option>`).join('');
        });
    </script>
</body>
</html>
