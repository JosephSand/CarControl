<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Mantenimiento - Kia Soul 2018</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 antialiased p-4 md:p-8">

  <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
    <!-- Encabezado -->
    <div class="bg-sky-500 p-6 text-white text-center">
      <h1 class="text-2xl font-bold">Telemetría y Servicios</h1>
      <p class="text-sky-100 mt-1">Kia Soul 2018</p>
    </div>

    <div class="p-6 space-y-6">
      
      <!-- Sección: Configuración de Alertas -->
      <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
        <h2 class="font-semibold text-slate-700 mb-3 flex items-center">
          <span>🔔 Notificaciones Automáticas</span>
        </h2>
        
        <label class="flex items-center space-x-3 mb-3 cursor-pointer">
          <input type="checkbox" id="wantsAlerts" class="form-checkbox h-5 w-5 text-sky-500 rounded">
          <span class="text-sm font-medium text-slate-700">Activar alertas</span>
        </label>

        <div id="alertFields" class="space-y-3 hidden">
          <div>
            <label class="block text-xs text-slate-500 mb-1">Nombre del Conductor</label>
            <!-- El placeholder incluye tu nombre por defecto para guiarte -->
            <input type="text" id="contactName" placeholder="Ej. Jose Sandoval" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Correo Electrónico</label>
            <input type="email" id="contactEmail" placeholder="tu-correo@ejemplo.com" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
          </div>
          <button id="saveProfileBtn" class="w-full bg-slate-800 text-white text-sm py-2 rounded-md hover:bg-slate-700 transition">
            Guardar Datos
          </button>
        </div>
      </div>

      <!-- Sección: Kilometraje Actual -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Kilometraje Actual (Km)</label>
        <div class="flex space-x-2">
          <input type="number" id="currentMileage" class="w-full px-3 py-2 border border-slate-300 rounded-md text-lg font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-500">
          <button id="saveMileageBtn" class="bg-sky-500 text-white px-4 py-2 rounded-md hover:bg-sky-600 transition font-medium">Actualizar</button>
        </div>
      </div>

      <!-- Sección: Lista de Mantenimientos -->
      <div>
        <h2 class="font-semibold text-slate-700 mb-3">Servicios Preventivos</h2>
        <div id="tasksContainer" class="space-y-3">
          <!-- Las tareas se inyectan aquí con JavaScript -->
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL: Elegir Fecha de Próximo Servicio -->
  <div id="serviceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6">
      <h3 class="text-lg font-bold text-slate-800 mb-1" id="modalTaskName">Servicio</h3>
      <p class="text-sm text-slate-500 mb-4">¿Cuándo toca el próximo mantenimiento?</p>
      
      <div class="space-y-4">
        <!-- Opción 1: Ingreso Manual -->
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Elige una fecha manual:</label>
          <input type="date" id="nextServiceDate" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>
        
        <!-- Opción 2: Botón Automático -->
        <button id="autoDateBtn" class="w-full bg-emerald-50 text-emerald-700 border border-emerald-200 text-sm py-2 rounded-md hover:bg-emerald-100 transition font-medium">
          + Calcular automático (6 meses)
        </button>
      </div>

      <div class="mt-6 flex space-x-3">
        <button id="closeModalBtn" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-md hover:bg-slate-300 transition text-sm font-medium">Cancelar</button>
        <button id="confirmServiceBtn" class="flex-1 bg-sky-500 text-white py-2 rounded-md hover:bg-sky-600 transition text-sm font-medium">Guardar Fecha</button>
      </div>
    </div>
  </div>

  <!-- SCRIPT CON FIREBASE Y LA LÓGICA DE LA INTERFAZ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // Tu configuración exacta de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD4mWBQ1YWHUMXwoI5tNYRLpNbTrol77dA",
      authDomain: "controlmantenimientoapp-7d55b.firebaseapp.com",
      projectId: "controlmantenimientoapp-7d55b",
      storageBucket: "controlmantenimientoapp-7d55b.firebasestorage.app",
      messagingSenderId: "1013852088342",
      appId: "1:1013852088342:web:629f92647bc7d4ad9eed37"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const MAINTENANCE_TASKS = [
      { id: 'oil', name: 'Cambio de Aceite y Filtro' },
      { id: 'tires', name: 'Rotación/Cambio Llantas' },
      { id: 'cabin_filter', name: 'Filtro de Cabina' },
      { id: 'engine_filter', name: 'Filtro de Motor' },
      { id: 'brake_fluid', name: 'Líquido de Frenos' },
      { id: 'brakes', name: 'Balatas' },
      { id: 'spark_plugs', name: 'Bujías' },
      { id: 'battery', name: 'Batería' }
    ];

    let currentUserDoc = null;
    let selectedTaskId = null;

    // INICIAR SESIÓN Y ESCUCHAR DATOS
    signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserDoc = doc(db, 'usuarios', user.uid, 'profile', 'data');
        
        onSnapshot(currentUserDoc, (docSnap) => {
          if (docSnap.exists()) {
            llenarInterfaz(docSnap.data());
          } else {
            setDoc(currentUserDoc, {
              vehicle: { make: "Kia", model: "Soul 2018" },
              currentMileage: 0,
              contact: { name: "", email: "", wantsAlerts: false },
              nextDates: {}
            }, { merge: true });
          }
        });
      }
    });

    // LLENAR PANTALLA CON LOS DATOS
    function llenarInterfaz(data) {
      document.getElementById('currentMileage').value = data.currentMileage || '';
      
      const contact = data.contact || {};
      document.getElementById('wantsAlerts').checked = contact.wantsAlerts || false;
      document.getElementById('contactName').value = contact.name || '';
      document.getElementById('contactEmail').value = contact.email || '';
      toggleAlertFields();

      const tasksContainer = document.getElementById('tasksContainer');
      tasksContainer.innerHTML = '';

      MAINTENANCE_TASKS.forEach(task => {
        const nextDate = (data.nextDates && data.nextDates[task.id]) ? data.nextDates[task.id] : 'No agendado';
        
        const div = document.createElement('div');
        div.className = "flex justify-between items-center bg-white p-3 rounded-lg border border-slate-200 shadow-sm";
        div.innerHTML = `
          <div>
            <p class="font-medium text-slate-800 text-sm">${task.name}</p>
            <p class="text-xs text-slate-500 mt-1">Próximo: <span class="${nextDate !== 'No agendado' ? 'font-semibold text-sky-600' : ''}">${nextDate}</span></p>
          </div>
          <button onclick="abrirModal('${task.id}', '${task.name}')" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded text-xs font-medium hover:bg-slate-200 transition">
            Agendar
          </button>
        `;
        tasksContainer.appendChild(div);
      });
    }

    // INTERACCIONES PRINCIPALES
    const alertCheckbox = document.getElementById('wantsAlerts');
    const alertFields = document.getElementById('alertFields');
    
    function toggleAlertFields() {
      if (alertCheckbox.checked) alertFields.classList.remove('hidden');
      else alertFields.classList.add('hidden');
    }
    
    alertCheckbox.addEventListener('change', toggleAlertFields);

    document.getElementById('saveProfileBtn').addEventListener('click', () => {
      setDoc(currentUserDoc, {
        contact: {
          wantsAlerts: alertCheckbox.checked,
          name: document.getElementById('contactName').value,
          email: document.getElementById('contactEmail').value
        }
      }, { merge: true }).then(() => alert("Datos de contacto guardados."));
    });

    document.getElementById('saveMileageBtn').addEventListener('click', () => {
      const miles = parseInt(document.getElementById('currentMileage').value);
      if(miles >= 0) {
        setDoc(currentUserDoc, { currentMileage: miles }, { merge: true });
      }
    });

    // LÓGICA DEL MODAL (VENTANA DE FECHA)
    const modal = document.getElementById('serviceModal');
    
    window.abrirModal = function(id, name) {
      selectedTaskId = id;
      document.getElementById('modalTaskName').innerText = name;
      document.getElementById('nextServiceDate').value = "";
      modal.classList.remove('hidden');
    }

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    // Botón para cálculo de fecha automática
    document.getElementById('autoDateBtn').addEventListener('click', () => {
      const hoy = new Date();
      hoy.setMonth(hoy.getMonth() + 6);
      const fechaFormateada = hoy.toISOString().split('T')[0];
      document.getElementById('nextServiceDate').value = fechaFormateada;
    });

    // Botón para confirmar la fecha en Firebase
    document.getElementById('confirmServiceBtn').addEventListener('click', () => {
      const selectedDate = document.getElementById('nextServiceDate').value;
      if(!selectedDate) {
        alert("Por favor selecciona una fecha o presiona el botón automático.");
        return;
      }

      setDoc(currentUserDoc, {
        nextDates: {
          [selectedTaskId]: selectedDate
        }
      }, { merge: true }).then(() => {
        modal.classList.add('hidden');
      });
    });
  </script>
</body>
</html>
