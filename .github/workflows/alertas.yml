name: Alertas Diarias de Mantenimiento

on:
  schedule:
    # Corre todos los días automáticamente (9:00 AM hora de El Salvador / CST)
    - cron: '0 15 * * *' 
  workflow_dispatch: # Permite ejecución manual de prueba

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install firebase-admin resend

      - name: Ejecutar revisión de mantenimientos
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node cron-check.js
